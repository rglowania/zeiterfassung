/* ═══════════════════════════════════════════════════════════════
   G-DESIGN — Template v1.0 (unverändert)
   ═══════════════════════════════════════════════════════════════ */

/* ── Tokens ─────────────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:        #0c1410;
  --surface:   #13201a;
  --surface2:  #192b22;
  --border:    #213328;
  --accent:    #5d9e7a;
  --accent-lt: #89c4a2;
  --accent-dim:rgba(93,158,122,0.13);
  --text:      #ddeee5;
  --text-muted:#6e9480;
}
[data-theme="light"]{
  --bg:        #f0f7f3;
  --surface:   #ffffff;
  --surface2:  #e6f2eb;
  --border:    #bdd8c8;
  --accent:    #2e7a50;
  --accent-lt: #1e5c3a;
  --accent-dim:rgba(46,122,80,0.10);
  --text:      #0f1f16;
  --text-muted:#4d7a5e;
}
@media(prefers-color-scheme:light){
  :root:not([data-theme]){
    --bg:#f0f7f3;--surface:#ffffff;--surface2:#e6f2eb;--border:#bdd8c8;
    --accent:#2e7a50;--accent-lt:#1e5c3a;--accent-dim:rgba(46,122,80,0.10);
    --text:#0f1f16;--text-muted:#4d7a5e;
  }
}

/* ── Reset ──────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}

/* ── Body & Background Grid ─────────────────────────────────── */
body{
  background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;font-weight:300;
  min-height:100vh;padding:40px 20px 80px;
  transition:background .25s,color .25s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(93,158,122,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(93,158,122,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ── Layout ─────────────────────────────────────────────────── */
.container{max-width:920px;margin:0 auto;position:relative;z-index:1;}

/* ── Theme Toggle ───────────────────────────────────────────── */
.theme-toggle{
  position:fixed;top:18px;right:20px;display:flex;gap:3px;
  z-index:1000;background:var(--surface);border:1px solid var(--border);padding:4px;
}
.theme-btn{
  width:28px;height:28px;background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all .2s;padding:0;
}
.theme-btn:hover{color:var(--accent);}
.theme-btn.active{color:var(--accent);background:var(--accent-dim);}
.theme-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Header ─────────────────────────────────────────────────── */
header{text-align:center;margin-bottom:48px;}
.badge{
  display:inline-block;font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);border:1px solid var(--accent-dim);
  padding:4px 14px;margin-bottom:18px;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,5vw,44px);font-weight:600;
  line-height:1.15;color:var(--text);margin-bottom:10px;
}
h1 span{color:var(--accent);}
.subtitle{
  font-size:12px;color:var(--text-muted);
  font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;
}
.subtitle-row{
  display:flex;justify-content:center;align-items:center;
  gap:14px;flex-wrap:wrap;margin-bottom:6px;
}
.gtools-link{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);text-decoration:none;
  border:1px solid var(--border);padding:3px 10px;
  transition:color .2s,border-color .2s;
}
.gtools-link:hover{color:var(--accent);border-color:var(--accent);}

/* ── Card ───────────────────────────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border);
  padding:24px 28px;margin-bottom:16px;
  position:relative;transition:background .25s,border-color .25s;
}
.card::before{
  content:'';position:absolute;top:0;left:0;
  width:3px;height:100%;background:var(--accent);
}
.card-title{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);margin-bottom:18px;
}

/* ── Accent Card ────────────────────────────────────────────── */
.accent-card{
  background:var(--surface);border:1px solid var(--accent);
  padding:28px;margin-bottom:16px;transition:background .25s;
}

/* ── Formular-Elemente ──────────────────────────────────────── */
select,input[type="number"],input[type="text"],input[type="time"]{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'IBM Plex Mono',monospace;
  font-size:12px;padding:6px 8px;outline:none;
  transition:border-color .2s,background .25s;
}
select:focus,input:focus{border-color:var(--accent);}
.hint{
  font-size:10px;color:var(--text-muted);margin-top:5px;
  font-family:'IBM Plex Mono',monospace;line-height:1.5;
}
.hint b{color:var(--accent-lt);}

/* ── Buttons ────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-muted);font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:1px;padding:8px 16px;
  cursor:pointer;transition:all .2s;
}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{border-color:var(--accent);color:var(--accent);}
.btn-primary:hover{background:var(--accent-dim);}

/* ── Footer ─────────────────────────────────────────────────── */
footer{
  text-align:center;padding:32px 0 24px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:1px;color:var(--text-muted);opacity:0.6;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width:680px){
  .card,.accent-card{padding:18px 16px;}
}

/* ═══════════════════════════════════════════════════════════════
   ENDE DESIGN SYSTEM — ab hier App-spezifisches CSS
   ═══════════════════════════════════════════════════════════════ */

/* ── Uhr & Live-Anzeige ─────────────────────────────────────── */
.live-row{
  display:flex;justify-content:center;align-items:center;
  gap:24px;margin-bottom:8px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:1.5px;color:var(--text-muted);
}
#live-time{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,5vw,3rem);font-weight:600;
  color:var(--text);letter-spacing:-0.02em;
  display:block;text-align:center;margin-bottom:4px;
}
#weekday{text-transform:uppercase;letter-spacing:3px;}
#mode-indicator{font-size:10px;letter-spacing:1px;color:var(--text-muted);}

/* ── Countdown Display ──────────────────────────────────────── */
.countdown-display{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.6rem,7vw,4.2rem);font-weight:600;
  color:var(--text);line-height:1;letter-spacing:-0.02em;
  margin-bottom:8px;
}
.countdown-sub{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:1px;color:var(--text-muted);margin-bottom:16px;
}
.done-msg{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.4rem,4vw,2rem);color:var(--accent);
}

/* ── Progress ───────────────────────────────────────────────── */
.progress-wrap{height:2px;background:var(--border);overflow:hidden;margin-bottom:6px;}
.progress-bar{height:100%;background:var(--accent);transition:width 1s linear;}
.progress-labels{
  display:flex;justify-content:space-between;
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:1px;color:var(--text-muted);
}

/* ── Card header row ────────────────────────────────────────── */
.card-header-row{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;
}
.card-header-row .card-title{margin-bottom:0;}
.drink-emoji{font-size:1.6rem;line-height:1;}

/* ── Wisdom ─────────────────────────────────────────────────── */
.wisdom-inner{display:flex;gap:14px;align-items:flex-start;}
.wisdom-icon{font-size:1.4rem;flex-shrink:0;margin-top:3px;}
.wisdom-text{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1rem,2.5vw,1.2rem);color:var(--text);line-height:1.55;
}
.wisdom-source{
  display:block;font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:1.5px;color:var(--text-muted);margin-top:8px;
}

/* ── Weekend Banner ─────────────────────────────────────────── */
#weekend-banner{display:none;}

/* ── Settings ───────────────────────────────────────────────── */
.settings-toggle{
  background:none;border:none;color:var(--text-muted);
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;gap:8px;width:100%;padding:0;transition:color .2s;
}
.settings-toggle:hover{color:var(--accent);}
.settings-toggle .arrow{display:inline-block;transition:transform .2s;font-size:9px;}
.settings-toggle.open .arrow{transform:rotate(90deg);}
.settings-body{display:flex;flex-direction:column;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.settings-body.hidden{display:none;}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.setting-row label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);flex-shrink:0;
}
.setting-row input[type="time"]{width:auto;color-scheme:dark;}
[data-theme="light"] .setting-row input[type="time"]{color-scheme:light;}

/* ── Animations ─────────────────────────────────────────────── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulsing{animation:pulse 2s ease-in-out infinite;}
</style>

<script>
// ── Theme ──────────────────────────────────────────────────────
function setTheme(t) {
  if (t === 'system') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', t);
  }
  try { localStorage.setItem('g-theme', t); } catch(e){}
  document.querySelectorAll('.theme-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + t);
  if (btn) btn.classList.add('active');
}
(function(){
  var saved = 'system';
  try { saved = localStorage.getItem('g-theme') || 'system'; } catch(e){}
  setTheme(saved);
})();

// Sonnendaten
const LAT = 47.593, LNG = 7.621;
let sunriseMin = 6*60, sunsetMin = 20*60, sunDataDate = '';
async function fetchSunTimes() {
  const today = new Date().toISOString().slice(0,10);
  if (sunDataDate === today) return;
  try {
    const res  = await fetch('https://api.sunrise-sunset.org/json?lat='+LAT+'&lng='+LNG+'&formatted=0&date='+today);
    const data = await res.json();
    if (data.status === 'OK') {
      const toLocalMin = function(iso){ const d = new Date(iso); return d.getHours()*60 + d.getMinutes(); };
      sunriseMin  = toLocalMin(data.results.sunrise);
      sunsetMin   = toLocalMin(data.results.sunset);
      sunDataDate = today;
    }
  } catch(e) {}
}

// Mode-Indikator
function applyModeIndicator() {
  const now    = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  const isNight = nowMin < sunriseMin || nowMin >= sunsetMin;
  const sh = String(Math.floor(sunriseMin/60)).padStart(2,'0');
  const sm = String(sunriseMin%60).padStart(2,'0');
  const eh = String(Math.floor(sunsetMin/60)).padStart(2,'0');
  const em = String(sunsetMin%60).padStart(2,'0');
  const theme = localStorage.getItem('g-theme') || 'system';
  if (theme === 'system') {
    document.getElementById('mode-indicator').textContent =
      isNight ? ('🌙 Auto · ☀ '+sh+':'+sm) : ('☀ Auto · 🌙 '+eh+':'+em);
  } else {
    document.getElementById('mode-indicator').textContent = theme === 'dark' ? '🌙 Dunkel' : '☀ Hell';
  }
}

// Countdown-Logik
const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
function pad(n){ return String(n).padStart(2,'0'); }
function formatCountdown(ms){
  if (ms <= 0) return '00:00:00';
  var s = Math.floor(ms/1000);
  return pad(Math.floor(s/3600))+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60);
}
function formatLong(ms){
  if (ms <= 0) return '';
  var s=Math.floor(ms/1000), d=Math.floor(s/86400), h=Math.floor((s%86400)/3600),
      m=Math.floor((s%3600)/60), sc=s%60;
  if (d > 0) return d+'T '+pad(h)+'h '+pad(m)+'m '+pad(sc)+'s';
  if (h > 0) return pad(h)+'h '+pad(m)+'m '+pad(sc)+'s';
  return pad(m)+'m '+pad(sc)+'s';
}
function getMin(t){ var p=t.split(':').map(Number); return p[0]*60+p[1]; }

function tick() {
  var now = new Date();
  var day = now.getDay();
  document.getElementById('live-time').textContent =
    pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());

  applyModeIndicator();

  var startStr = document.getElementById('input-start').value || '07:30';
  var endStr   = document.getElementById('input-end').value   || '16:00';
  var startMin = getMin(startStr), endMin = getMin(endStr);
  var nowMin   = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;

    document.getElementById('weekend-banner').style.display = 'block';
    document.getElementById('card-feierabend').style.display = 'none';
    document.getElementById('card-weekend').style.display = 'none';
    return;
  }
  document.getElementById('weekend-banner').style.display = 'none';
  document.getElementById('card-feierabend').style.display = 'block';
  document.getElementById('card-weekend').style.display = 'block';

  var endOfDay   = new Date(now); endOfDay.setHours(Math.floor(endMin/60), endMin%60, 0, 0);
  var startOfDay = new Date(now); startOfDay.setHours(Math.floor(startMin/60), startMin%60, 0, 0);
  document.getElementById('label-start').textContent = startStr + ' Uhr';
  document.getElementById('label-end').textContent   = endStr + ' Uhr';

  if (nowMin < startMin) {
    document.getElementById('feierabend-display').innerHTML =
      '<span class="pulsing">'+formatCountdown(startOfDay - now)+'</span>';
    document.getElementById('feierabend-sub').textContent = '← Arbeit beginnt in...';
    document.getElementById('progress-feierabend').style.width = '0%';
  } else if (nowMin >= endMin) {
    document.getElementById('feierabend-display').innerHTML =
      '<span class="done-msg">Feierabend! 🎉</span>';
    document.getElementById('feierabend-sub').textContent = 'Du hast es verdient.';
    document.getElementById('progress-feierabend').style.width = '100%';
  } else {
    var pct = Math.min(100, ((now - startOfDay) / ((endMin - startMin)*60000)) * 100);
    document.getElementById('feierabend-display').textContent = formatCountdown(endOfDay - now);
    document.getElementById('feierabend-sub').textContent =
      'Feierabend um '+endStr+' Uhr — '+Math.round(pct)+'% des Tages rum';
    document.getElementById('progress-feierabend').style.width = pct+'%';
  }

  var daysUntilFri = (5 - day + 7) % 7 || (nowMin >= endMin ? 7 : 0);
  var nextFri = new Date(now);
  nextFri.setDate(now.getDate() + daysUntilFri);
  nextFri.setHours(Math.floor(endMin/60), endMin%60, 0, 0);
  var lastMon = new Date(now);
  lastMon.setDate(now.getDate() - ((day - 1 + 7) % 7));
  lastMon.setHours(0, 0, 0, 0);
  var weekPct = Math.min(100, ((now - lastMon) / (nextFri - lastMon)) * 100);

  if (day === 5 && nowMin >= endMin) {
    document.getElementById('weekend-display').innerHTML = '<span class="done-msg">Wochenende! 🎉</span>';
    document.getElementById('weekend-sub').textContent = 'Schönes Wochenende!';
    document.getElementById('progress-weekend').style.width = '100%';
  } else {
    document.getElementById('weekend-display').textContent = formatLong(nextFri - now);
    var friName = daysUntilFri === 0 ? 'heute' : ('in '+daysUntilFri+' Tag'+(daysUntilFri > 1 ? 'en' : ''));
    document.getElementById('weekend-sub').textContent =
      'Freitag '+friName+' um '+endStr+' Uhr — Woche '+Math.round(weekPct)+'% vorbei';
    document.getElementById('progress-weekend').style.width = weekPct+'%';
  }
}

// Tick sofort starten — Sonnenwerte laden im Hintergrund nach
tick();
setInterval(tick, 1000);
fetchSunTimes();
setInterval(fetchSunTimes, 60*60*1000);
</script>
